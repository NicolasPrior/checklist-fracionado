<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Premium - Centrosucar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --verde-centro: #005A32; /* Verde profundo institucional */
            --verde-destaque: #2E7D32; /* Verde vibrante botões */
            --verde-fundo: #F2F7F4; /* Fundo limpo */
            --texto-escuro: #1A251D; 
            --texto-mutado: #5C6E62;
            --borda: #E0E6E2;
            --erro: #D32F2F; 
            --dourado: #F9A825;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        body { 
            background: #F4F7F6; 
            padding: 20px 10px 120px 10px; 
            display: flex; flex-direction: column; align-items: center; 
            color: var(--texto-escuro); 
        }

        /* Área Principal Elegante */
        #render-area { 
            width: 100%; max-width: 800px; 
            background: #FFFFFF; padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
            margin: 0 auto; 
        }

        /* Cabeçalho */
        .header { text-align: center; border-bottom: 2px solid var(--verde-fundo); padding-bottom: 20px; margin-bottom: 25px; }
        .header h2 { color: var(--verde-centro); font-size: 20px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

        /* Campos de Entrada Premium */
        .dados-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .campo { display: flex; flex-direction: column; }
        .campo label { font-size: 12px; font-weight: 700; color: var(--texto-mutado); margin-bottom: 8px; text-transform: uppercase; }
        .campo input, .campo select { 
            padding: 14px 15px; border: 1px solid var(--borda); 
            background: #FAFAFA; border-radius: 8px; font-size: 15px; 
            color: var(--texto-escuro); transition: all 0.3s; 
        }
        .campo input:focus, .campo select:focus { 
            border-color: var(--verde-destaque); background: #FFFFFF; 
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1); outline: none; 
        }

        /* Seções e Volumes */
        .volume-box { 
            border: 1px solid var(--borda); padding: 25px; margin-bottom: 25px; 
            background: #FFFFFF; border-radius: 12px; position: relative; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .volume-box::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 5px; background: var(--verde-centro); border-radius: 12px 0 0 12px; }
        .header-volume { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--verde-fundo); padding-bottom: 10px; }
        .header-volume h4 { font-size: 16px; color: var(--texto-escuro); }
        
        .foto-wrapper { display: flex; gap: 20px; }
        .foto-col { flex: 1; text-align: center; }
        .foto-col label { font-size: 11px; font-weight: 700; color: var(--texto-mutado); display: block; margin-bottom: 10px; text-transform: uppercase; }
        
        .box-imagem { 
            width: 100%; height: 200px; border: 2px dashed #C0C8D0; border-radius: 10px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; overflow: hidden; background: #FAFCFD; cursor: pointer; transition: 0.3s;
        }
        .box-imagem:hover { border-color: var(--verde-destaque); background: var(--verde-fundo); }
        .box-imagem img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; background: white; z-index: 5;}
        .box-imagem input { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        .msg-camera { font-size: 14px; font-weight: 700; color: var(--texto-mutado); }

        /* Botão Pendentes Superior */
        #btn-abrir-pendentes { 
            position: fixed; top: 20px; right: 20px; z-index: 9999; 
            background: var(--verde-centro); color: white; border: none; 
            padding: 12px 18px; border-radius: 10px; font-weight: bold; font-size: 13px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; transition: 0.3s;
        }
        #btn-abrir-pendentes:hover { transform: translateY(-2px); }
        #count-pendentes { background: var(--dourado); color: white; padding: 3px 8px; border-radius: 50%; font-size: 12px; margin-left: 5px;}

        /* Botoes Flutuantes Rodapé */
        .botoes-fixos { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 95%; max-width: 600px; display: flex; gap: 15px; z-index: 999; 
            background: rgba(255, 255, 255, 0.95); padding: 15px 20px; border-radius: 50px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); backdrop-filter: blur(10px);
        }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 30px; font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: 0.5px; transition: 0.3s; }
        .btn-add { background: white; border: 2px solid var(--verde-destaque); color: var(--verde-destaque); }
        .btn-add:hover { background: var(--verde-fundo); }
        .btn-standby { background: var(--dourado); color: white; box-shadow: 0 4px 10px rgba(249, 168, 37, 0.3); }
        .btn-save { background: var(--verde-destaque); color: white; box-shadow: 0 4px 10px rgba(46, 125, 50, 0.3); }
        .btn-save:hover { background: var(--verde-centro); transform: translateY(-2px); }

        /* Modal Standby */
        #modal-pendentes { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; padding:20px; backdrop-filter: blur(5px);}
        .modal-conteudo { background:white; padding:30px; border-radius:16px; max-width:500px; margin: 60px auto; color: black; box-shadow: 0 20px 40px rgba(0,0,0,0.3);}

        /* Regras do PDF Inteligente */
        .modo-pdf { width: 794px !important; padding: 20px 30px !important; background: white; }
        .modo-pdf .volume-box { page-break-inside: avoid !important; break-inside: avoid !important; margin-bottom: 15px !important; padding: 15px !important; }
        .modo-pdf .campo { page-break-inside: avoid !important; break-inside: avoid !important; }
        .modo-pdf .box-imagem { height: 260px !important; }
        
        #loading { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-weight: bold; color: var(--verde-centro); z-index: 10000; font-size: 18px; text-align: center; width: 80%; }

        /* OTIMIZAÇÃO PARA CELULAR (Mobile First) */
        @media (max-width: 768px) {
            body { padding: 10px 5px 120px 5px; background: #FFFFFF; }
            #render-area { padding: 15px; box-shadow: none; border-radius: 0; width: 100%; }
            .dados-container { grid-template-columns: 1fr; gap: 15px; } /* Empilha tudo num formato de lista */
            .foto-wrapper { flex-direction: column; gap: 15px; } /* Fotos uma embaixo da outra */
            .box-imagem { height: 180px; } /* Ajusta altura da câmera para a tela do celular */
            
            /* Ajuste dos Botões no Rodapé do Celular */
            .botoes-fixos { width: 100%; bottom: 10px; padding: 10px; flex-wrap: wrap; border-radius: 15px; }
            .btn { font-size: 11px; padding: 12px; }
            
            #btn-abrir-pendentes { top: 10px; right: 10px; padding: 10px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <button type="button" id="btn-abrir-pendentes" onclick="abrirPendentes()">
        📋 PENDENTES <span id="count-pendentes">0</span>
    </button>

    <div id="render-area">
        <div class="header">
            <h2>Checklist de Carregamento</h2>	
        </div>
        
        <div id="data-hora-pdf" style="display: none; text-align: center; margin-bottom: 25px; font-weight: bold; color: var(--verde-centro); background: var(--verde-fundo); padding: 10px; border-radius: 8px;"></div>

        <div class="dados-container">
            <div class="campo"><label>CLIENTE *</label><input type="text" id="c" placeholder="Nome do Cliente"></div>
            <div class="campo"><label>TRANSPORTADORA *</label><input type="text" id="t" placeholder="Empresa"></div>
            <div class="campo"><label>MOTORISTA *</label><input type="text" id="m" placeholder="Nome Completo"></div>
            <div class="campo"><label>PLACA DO VEÍCULO *</label><input type="text" id="p" placeholder="ABC-1234"></div>
            <div class="campo">
                <label>TIPO DE CARGA *</label>
                <select id="tipo-carga" onchange="mudarTipoCarga()">
                    <option value="">Selecione o formato...</option>
                    <option value="tambor">Tambor / IBC / Container</option>
                    <option value="bag">Bag in Box</option>
                </select>
            </div>
            <div class="campo"><label>QTD. VOLUMES *</label><input type="number" id="qtd-volumes" placeholder="Ex: 10"></div>
            <div class="campo" style="grid-column: 1 / -1;"><label>Nº DA NOTA FISCAL *</label><input type="text" id="nota-fiscal" placeholder="Aguardando faturamento..."></div>
        </div>
        
        <div id="secao-caminhao" class="volume-box" style="display: none; border: 2px solid var(--verde-centro);">
            <div class="header-volume" style="border-bottom: none;">
                <h4 style="color: var(--verde-centro); font-weight: 700;">FOTOS DO VEÍCULO</h4>
            </div>
            <div class="foto-wrapper">
                <div class="foto-col">
                    <label>LATERAL</label>
                    <div class="box-imagem">
                        <span class="msg-camera">📷 Tocar para Foto</span>
                        <input type="file" accept="image/*" capture="environment" onchange="preview(this)">
                        <img style="display:none;">
                    </div>
                </div>
                <div class="foto-col">
                    <label>CARREGAMENTO</label>
                    <div class="box-imagem">
                        <span class="msg-camera">📷 Tocar para Foto</span>
                        <input type="file" accept="image/*" capture="environment" onchange="preview(this)">
                        <img style="display:none;">
                    </div>
                </div>
                <div class="foto-col">
                    <label>PLACA</label>
                    <div class="box-imagem">
                        <span class="msg-camera">📷 Tocar para Foto</span>
                        <input type="file" accept="image/*" capture="environment" onchange="preview(this)">
                        <img style="display:none;">
                    </div>
                </div>
            </div>
        </div>

        <div id="container-volumes"></div>
    </div>

    <div id="loading">⌛ Gerando PDF Oficial...</div>

    <div class="botoes-fixos">
        <button type="button" class="btn btn-add" id="btn-add-vol" onclick="addV()" style="display:none;">+ VOLUME</button>
        <button type="button" class="btn btn-standby" onclick="salvarParaDepois()">STANDBY (NF)</button>
        <button type="button" class="btn btn-save" onclick="gerarPDF()">GERAR PDF</button>
    </div>

    <div id="modal-pendentes">
        <div class="modal-conteudo">
            <h3 style="color: var(--verde-centro); border-bottom: 2px solid var(--borda); padding-bottom: 10px; margin-bottom: 15px;">Aguardando Nota Fiscal</h3>
            <div id="lista-pendentes-corpo" style="max-height: 350px; overflow-y: auto;"></div>
            <button onclick="document.getElementById('modal-pendentes').style.display='none'" style="width:100%; padding:15px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; background: white; margin-top: 15px; cursor: pointer;">FECHAR</button>
        </div>
    </div>

    <script>
        let pendentes = JSON.parse(localStorage.getItem('checklists_pendentes') || '[]');

        window.onload = function() { atualizarContador(); };

        function mudarTipoCarga() {
            const tipo = document.getElementById('tipo-carga').value;
            const secCam = document.getElementById('secao-caminhao');
            const secVol = document.getElementById('container-volumes');
            const btnAdd = document.getElementById('btn-add-vol');

            secVol.innerHTML = ''; 

            if (tipo === "") {
                secCam.style.display = 'none';
                btnAdd.style.display = 'none';
                return;
            }

            secCam.style.display = 'block';
            btnAdd.style.display = 'block'; // Fica visível para BAG e TAMBOR
            addV(); // Cria Volume 1 automaticamente
        }

        function addV() {
            const container = document.getElementById('container-volumes');
            const num = container.querySelectorAll('.volume-box').length + 1;
            const html = `
                <div class="volume-box">
                    <div class="header-volume">
                        <h4>Volume ${num}</h4>
                        ${num > 1 ? `<button type="button" class="btn-remover" onclick="this.closest('.volume-box').remove(); reordenar();" style="color:red; background:none; border:none; font-weight:bold; cursor:pointer;">REMOVER</button>` : ''}
                    </div>
                    <div class="foto-wrapper">
                        <div class="foto-col">
                            <label>FOTO ETIQUETA *</label>
                            <div class="box-imagem">
                                <span class="msg-camera">📷 Tocar para Foto</span>
                                <input type="file" accept="image/*" capture="environment" onchange="preview(this)">
                                <img style="display:none;">
                            </div>
                        </div>
                        <div class="foto-col">
                            <label>FOTO LACRE *</label>
                            <div class="box-imagem">
                                <span class="msg-camera">📷 Tocar para Foto</span>
                                <input type="file" accept="image/*" capture="environment" onchange="preview(this)">
                                <img style="display:none;">
                            </div>
                        </div>
                    </div>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        function reordenar() {
            document.querySelectorAll('#container-volumes h4').forEach((h, i) => h.innerText = `Volume ${i+1}`);
        }

        function preview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const box = input.parentElement;
                    const img = box.querySelector('img');
                    // Salva imagem na src
                    img.src = e.target.result;
                    img.style.display = 'block';
                    box.querySelector('.msg-camera').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function salvarParaDepois() {
            const placa = document.getElementById('p').value;
            if(!placa) {
                document.getElementById('p').style.borderColor = 'red';
                return alert("Digite ao menos a PLACA DO VEÍCULO antes de salvar.");
            }
            
            const dados = {
                p: placa, 
                c: document.getElementById('c').value, 
                t: document.getElementById('t').value,
                m: document.getElementById('m').value, 
                q: document.getElementById('qtd-volumes').value,
                tp: document.getElementById('tipo-carga').value, 
                dt: new Date().toLocaleString(),
                // Salva HTML do caminhão E dos volumes
                htmlCam: document.getElementById('secao-caminhao').innerHTML,
                htmlVol: document.getElementById('container-volumes').innerHTML
            };
            
            pendentes.push(dados);
            localStorage.setItem('checklists_pendentes', JSON.stringify(pendentes));
            alert("✅ Checklist salvo com sucesso! A tela será limpa para o próximo.");
            location.reload();
        }

        function abrirPendentes() {
            const corpo = document.getElementById('lista-pendentes-corpo');
            corpo.innerHTML = pendentes.length ? '' : '<p style="text-align:center; color:gray;">Nenhuma carga em espera.</p>';
            
            pendentes.forEach((item, i) => {
                corpo.innerHTML += `
                    <div style="background:#F9FBFA; border:1px solid #E0E6E2; padding:15px; border-radius:10px; margin-bottom:10px; border-left: 5px solid var(--dourado);">
                        <strong style="color:var(--verde-centro); font-size:16px;">Placa: ${item.p}</strong><br>
                        <span style="font-size:12px; color:gray;">Salvo em: ${item.dt}</span><br>
                        <div style="display:flex; gap:10px; margin-top:12px;">
                            <button onclick="recuperar(${i})" style="flex:1; background:var(--verde-destaque); color:white; border:none; padding:10px; border-radius:6px; font-weight:bold; cursor:pointer;">RETOMAR</button>
                            <button onclick="excluir(${i})" style="background:#D32F2F; color:white; border:none; padding:10px 15px; border-radius:6px; font-weight:bold; cursor:pointer;">X</button>
                        </div>
                    </div>`;
            });
            document.getElementById('modal-pendentes').style.display = 'block';
        }

        function recuperar(i) {
            const item = pendentes[i];
            
            // Restaura campos
            document.getElementById('p').value = item.p;
            document.getElementById('c').value = item.c;
            document.getElementById('t').value = item.t;
            document.getElementById('m').value = item.m;
            document.getElementById('qtd-volumes').value = item.q;
            document.getElementById('tipo-carga').value = item.tp;
            
            // Restaura as fotos (HTML completo)
            document.getElementById('secao-caminhao').innerHTML = item.htmlCam;
            document.getElementById('container-volumes').innerHTML = item.htmlVol;
            
            // Reabilita exibição do caminhão e botão de volume
            document.getElementById('secao-caminhao').style.display = 'block';
            document.getElementById('btn-add-vol').style.display = 'block';

            pendentes.splice(i, 1);
            localStorage.setItem('checklists_pendentes', JSON.stringify(pendentes));
            document.getElementById('modal-pendentes').style.display = 'none';
            atualizarContador();
        }

        function excluir(i) {
            if(confirm("Tem certeza que deseja excluir esta carga?")) {
                pendentes.splice(i, 1);
                localStorage.setItem('checklists_pendentes', JSON.stringify(pendentes));
                abrirPendentes();
                atualizarContador();
            }
        }

        function atualizarContador() {
            document.getElementById('count-pendentes').innerText = pendentes.length;
        }

        function gerarPDF() {
            const nf = document.getElementById('nota-fiscal').value;
            
            // 1. LIMPEZA DOS ERROS (Tira o vermelho antigo antes de checar de novo)
            document.querySelectorAll('.campo input, .campo select').forEach(el => {
                el.style.borderBottom = '2px solid var(--borda)';
                el.style.backgroundColor = '#FAFAFA';
            });
            document.querySelectorAll('.box-imagem').forEach(box => {
                box.style.border = '2px dashed #C0C8D0';
                box.style.backgroundColor = '#FAFCFD';
            });

            // 2. VALIDAÇÃO NOVA (Checa se ainda falta algo)
            let bloqueiaGeracao = false;
            
            if(!nf) {
                document.getElementById('nota-fiscal').style.borderColor = 'red';
                bloqueiaGeracao = true;
            }
            
            document.querySelectorAll('.dados-container input, .dados-container select').forEach(input => {
                if (!input.value.trim()) {
                    input.style.borderBottom = '2px solid red';
                    input.style.backgroundColor = '#fff1f1';
                    bloqueiaGeracao = true;
                }
            });

            document.querySelectorAll('.box-imagem').forEach(box => {
                if (box.closest('#container-volumes') && document.getElementById('container-volumes').style.display === 'none') return;
                if (box.closest('#secao-caminhao') && document.getElementById('secao-caminhao').style.display === 'none') return;

                const img = box.querySelector('img');
                if (!img.src || img.style.display === 'none') {
                    box.style.border = '2px dashed red';
                    box.style.backgroundColor = '#fff1f1';
                    bloqueiaGeracao = true;
                }
            });

            if (bloqueiaGeracao) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return alert("⚠️ Por favor, preencha todos os campos e fotos que estão em VERMELHO antes de gerar o PDF!");
            }

            // --- SE PASSOU PELA VALIDAÇÃO, PREPARA O PDF ---

            // Grava os valores digitados para o PDF conseguir ler
            document.querySelectorAll('.campo input, .campo select').forEach(el => el.setAttribute('value', el.value));

            const element = document.getElementById('render-area');
            const load = document.getElementById('loading');
            const dataPdf = document.getElementById('data-hora-pdf');
            const btnRemover = document.querySelectorAll('.btn-remover');

            // 3. ORGANIZADOR DE PÁGINAS (Cria quebras de folha perfeitas)
            const secVol = document.getElementById('container-volumes');
            let quebrasInvisiveis = []; // Guarda as quebras para apagar da tela depois

            if (secVol.innerHTML.trim() !== '') {
                // Pula a página ANTES de começar as etiquetas (Garante a Pág 1 só pro caminhão)
                const quebraPrincipal = document.createElement('div');
                quebraPrincipal.className = 'quebra-pagina';
                secVol.parentNode.insertBefore(quebraPrincipal, secVol);
                quebrasInvisiveis.push(quebraPrincipal);

                // Pula de página a cada 2 Volumes (Para as fotos ficarem grandes)
                const volumes = secVol.querySelectorAll('.volume-box');
                volumes.forEach((vol, index) => {
                    if ((index + 1) % 2 === 0 && index !== volumes.length - 1) {
                        const quebraVol = document.createElement('div');
                        quebraVol.className = 'quebra-pagina';
                        vol.parentNode.insertBefore(quebraVol, vol.nextSibling);
                        quebrasInvisiveis.push(quebraVol);
                    }
                });
            }

            // Oculta botões da tela
            dataPdf.innerText = "Checklist Finalizado em: " + new Date().toLocaleString() + " | NF: " + nf;
            dataPdf.style.display = 'block';
            load.style.display = 'block';
            element.classList.add('modo-pdf');
            
            document.querySelector('.botoes-fixos').style.display = 'none';
            document.getElementById('btn-abrir-pendentes').style.display = 'none';
            btnRemover.forEach(b => b.style.display = 'none');

            // Qualidade Máxima do PDF
            const opt = {
                margin: [10, 5, 10, 5], 
                filename: `Checklist_${document.getElementById('p').value || 'NF_'+nf}.pdf`,
                image: { type: 'jpeg', quality: 1.0 }, 
                html2canvas: { scale: 2, useCORS: true, allowTaint: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                // Devolve o aplicativo ao normal
                element.classList.remove('modo-pdf');
                dataPdf.style.display = 'none';
                load.style.display = 'none';
                document.querySelector('.botoes-fixos').style.display = 'flex';
                document.getElementById('btn-abrir-pendentes').style.display = 'block';
                btnRemover.forEach(b => b.style.display = 'block');
                
                // Apaga as quebras de página da tela do celular
                quebrasInvisiveis.forEach(q => q.remove());
            });
        }
    </script>
</body>
</html>
