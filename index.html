<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist - Centrosucar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --verde-centro: #005A32; /* Verde profundo institucional */
            --verde-destaque: #2E7D32; /* Verde vibrante botões */
            --verde-fundo: #F2F7F4; /* Fundo limpo */
            --texto-escuro: #1A251D; 
            --texto-mutado: #5C6E62;
            --borda: #E0E6E2;
            --erro: #D32F2F; 
            --dourado: #F9A825;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        /* ESTILOS GERAIS PARA O CELULAR (FORA DO PDF) */
        body:not(.modo-pdf) { 
            background: #F4F7F6; 
            padding: 20px 10px 120px 10px; 
            display: flex; flex-direction: column; align-items: center; 
            color: var(--texto-escuro); 
        }

        #render-area { 
            width: 100%; max-width: 800px; 
            background: #FFFFFF; padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
            margin: 0 auto; 
        }

/* Força a quebra de página após cada par de volumes */
.quebra-pagina-obrigatoria {
    page-break-after: always !important;
    break-after: page !important;
}

/* Garante que o cabeçalho não empurre o conteúdo para a segunda página */
#render-area {
    position: static !important;
    margin: 0 auto !important;
}

        /* Cabeçalho */
        .header { text-align: center; border-bottom: 2px solid var(--verde-fundo); padding-bottom: 20px; margin-bottom: 25px; }
        .header h2 { color: var(--verde-centro); font-size: 20px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

        /* MELHORIA NO VISUAL DO CELULAR - TELA PRINCIPAL */
        .dados-container:not(.modo-pdf) { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-bottom: 20px; 
        }

        .campo { display: flex; flex-direction: column; }
        .campo label { font-size: 12px; font-weight: 700; color: var(--texto-mutado); margin-bottom: 8px; text-transform: uppercase; }
        
        input:not([type="file"]):not(.modo-pdf), 
        select:not(.modo-pdf) { 
            width: 100%;
            padding: 15px !important; 
            border: 1px solid var(--borda); 
            background: #FAFAFA; border-radius: 8px; font-size: 16px; 
            color: var(--texto-escuro); transition: all 0.3s; 
        }
        
        input:focus, select:focus { 
            border-color: var(--verde-destaque); background: #FFFFFF; 
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1); outline: none; 
        }

        /* Seções e Volumes */
        .volume-box { 
            border: 1px solid var(--borda); padding: 25px; margin-bottom: 30px; 
            background: #FFFFFF; border-radius: 12px; position: relative; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .volume-box::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 5px; background: var(--verde-centro); border-radius: 12px 0 0 12px; }
        .header-volume { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--verde-fundo); padding-bottom: 10px; }
        .header-volume h4 { font-size: 16px; color: var(--texto-escuro); }
        
        .foto-wrapper:not(.modo-pdf) { display: flex; gap: 10px; flex-direction: row; width: 100%; }
        .foto-col { flex: 1; text-align: center; }
        .foto-col label { font-size: 11px; font-weight: 700; color: var(--texto-mutado); display: block; margin-bottom: 10px; text-transform: uppercase; }
        
        .box-imagem:not(.modo-pdf) { 
            width: 100%; height: 200px; border: 2px dashed #C0C8D0; border-radius: 10px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; overflow: hidden; background: #FAFCFD; cursor: pointer; transition: 0.3s;
        }
        .box-imagem:not(.modo-pdf):hover { border-color: var(--verde-destaque); background: var(--verde-fundo); }
        .box-imagem img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; background: white; z-index: 5;}
        .box-imagem input { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        .msg-camera { font-size: 14px; font-weight: 700; color: var(--texto-mutado); }

        /* Botão Pendentes Superior */
        #btn-abrir-pendentes { 
            position: fixed; top: 20px; right: 20px; z-index: 9999; 
            background: var(--verde-centro); color: white; border: none; 
            padding: 12px 18px; border-radius: 10px; font-weight: bold; font-size: 13px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; transition: 0.3s;
        }
        #btn-abrir-pendentes:hover { transform: translateY(-2px); }
        #count-pendentes { background: var(--dourado); color: white; padding: 3px 8px; border-radius: 50%; font-size: 12px; margin-left: 5px;}

        /* Botoes Flutuantes Rodapé */
        .botoes-fixos { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 95%; max-width: 600px; display: flex; gap: 15px; z-index: 999; 
            background: rgba(255, 255, 255, 0.95); padding: 15px 20px; border-radius: 50px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); backdrop-filter: blur(10px);
        }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 30px; font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: 0.5px; transition: 0.3s; }
        .btn-add { background: white; border: 2px solid var(--verde-destaque); color: var(--verde-destaque); }
        .btn-add:hover { background: var(--verde-fundo); }
        .btn-standby { background: var(--dourado); color: white; box-shadow: 0 4px 10px rgba(249, 168, 37, 0.3); }
        .btn-save { background: var(--verde-destaque); color: white; box-shadow: 0 4px 10px rgba(46, 125, 50, 0.3); }
        .btn-save:hover { background: var(--verde-centro); transform: translateY(-2px); }

        /* Modal Standby */
        #modal-pendentes { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; padding:20px; backdrop-filter: blur(5px);}
        .modal-conteudo { background:white; padding:30px; border-radius:16px; max-width:500px; margin: 60px auto; color: black; box-shadow: 0 20px 40px rgba(0,0,0,0.3);}

        /* 1. ESCONDER O LOADING AO ABRIR */
        #loading { 
            display: none !important; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.3); 
            z-index: 10001; 
        }

        /* AJUSTES DE POSICIONAMENTO E TRAVAMENTO DO PDF */
.modo-pdf { 
            width: 760px !important; /* Diminuído para caber com folga no papel */
            margin: 0 auto !important; /* Centraliza perfeitamente no meio */
            padding: 30px 20px !important; /* Aumentei o padding do topo para ajudar na questão 2 */
            display: block !important;
            background: white !important;
            text-align: left !important; 
        }

        .modo-pdf .header { text-align: center; margin-bottom: 20px; }

        .modo-pdf .dados-container { 
            display: grid !important; 
            grid-template-columns: 1fr 1fr !important; 
            gap: 15px !important; 
        }

        /* --- ALTERAÇÃO AQUI: TRAVA DA SEÇÃO CAMINHÃO --- */
        .modo-pdf #secao-caminhao {
            display: block !important; /* Mudado de table para block para não subir */
            width: 100% !important;
            clear: both !important;
            float: none !important;
            position: relative !important;
            overflow: hidden !important; /* Impede que o conteúdo vaze e empurre outros */
            page-break-after: always !important; 
            margin-bottom: 20px !important;
            padding: 20px !important;
            border: 2px solid #333 !important; /* Borda mais forte para marcar o limite */
        }

        /* --- ALTERAÇÃO AQUI: TRAVA DAS BOXES DE VOLUMES --- */
        .modo-pdf .volume-box { 
            display: block !important; /* Mudado de table para block */
            width: 100% !important;
            clear: both !important;
            float: none !important;
            position: relative !important;
            overflow: hidden !important;
            page-break-inside: avoid !important;
            border: 2px solid #333 !important;
            margin-bottom: 40px !important; /* Aumentado para 40px para evitar colisão */
            padding: 20px !important;
            background: #fff !important;
        }

        .modo-pdf .volume-box .foto-wrapper { 
            display: grid !important;
            grid-template-columns: 1fr 1fr !important; 
            gap: 20px !important;
            clear: both !important;
        }

        .modo-pdf .box-imagem { 
            width: 100% !important; 
            height: 160px !important; 
            border: 1px solid #ccc !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background: #fff !important;
        }

        .modo-pdf #secao-caminhao .box-imagem {
            height: 140px !important; 
        }

        .modo-pdf .box-imagem img {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
            display: block !important;
        }

        /* --- ADICIONADO: ESTILO PARA CAMPOS VAZIOS (VALIDAÇÃO) --- */
        input:invalid, select:invalid {
            border: 2px solid #ff0000 !important;
        }

        .campo-erro {
            border: 2px solid red !important;
            background-color: #fff0f0 !important;
        }

        /* Esconde botões e lixo no PDF */
        .modo-pdf .btn-remover, .modo-pdf button, .modo-pdf .msg-camera, .modo-pdf input[type="file"] { 
            display: none !important; 
        }
</style>
</head>
<body>

    <button type="button" id="btn-abrir-pendentes" onclick="abrirPendentes()">
        📋 PENDENTES <span id="count-pendentes">0</span>
    </button>

  <div id="render-area">
        <div class="header">

            <h2>Checklist de Carregamento</h2>
        </div>
        
        <div id="data-hora-pdf" style="display: none; text-align: center; margin-bottom: 25px; font-weight: bold; color: var(--verde-centro); background: var(--verde-fundo); padding: 10px; border-radius: 8px;"></div>

        <div class="dados-container">
            <div class="campo"><label>CLIENTE *</label><input type="text" id="c" placeholder="Nome do Cliente"></div>
            <div class="campo"><label>TRANSPORTADORA *</label><input type="text" id="t" placeholder="Nome da Transportadora"></div>
            <div class="campo"><label>MOTORISTA *</label><input type="text" id="m" placeholder="Nome Completo"></div>
            <div class="campo"><label>PLACA DO VEÍCULO *</label><input type="text" id="p" placeholder="ABC-1234"></div>
            <div class="campo">
                <label>TIPO DE CARGA *</label>
                <select id="tipo-carga" onchange="mudarTipoCarga()">
    <option value="">Selecione o formato...</option>
    <option value="Tambor / Container">Tambor / Container</option>
    <option value="Bag in Box">Bag in Box</option>
</select>
            </div>
            <div class="campo"><label>QTD. VOLUMES *</label><input type="number" id="qtd-volumes" placeholder="Ex: 10"></div>
            <div class="campo" style="grid-column: 1 / -1;"><label>Nº DA NOTA FISCAL *</label><input type="text" id="nota-fiscal" placeholder="Aguardando faturamento..."></div>
        </div>
        
        <div id="secao-caminhao" class="volume-box" style="display: none; border: 2px solid var(--verde-centro);">
            <div class="header-volume" style="border-bottom: none;">
                <h4 style="color: var(--verde-centro); font-weight: 700;">FOTOS DO VEÍCULO</h4>
            </div>
            <div class="foto-wrapper">
                <div class="foto-col">
                    <label>LATERAL DO CAMINHÃO CARREGADO</label>
                    <div class="box-imagem">
                        <span class="msg-camera">📷 Tocar para Foto</span>
                        <input type="file" accept="image/*" capture="environment" onchange="preview(this)">
                        <img style="display:none;">
                    </div>
                </div>
                <div class="foto-col">
                    <label>CARREGAMENTO</label>
                    <div class="box-imagem">
                        <span class="msg-camera">📷 Tocar para Foto</span>
                        <input type="file" accept="image/*" capture="environment" onchange="preview(this)">
                        <img style="display:none;">
                    </div>
                </div>
                <div class="foto-col">
                    <label>PLACA</label>
                    <div class="box-imagem">
                        <span class="msg-camera">📷 Tocar para Foto</span>
                        <input type="file" accept="image/*" capture="environment" onchange="preview(this)">
                        <img style="display:none;">
                    </div>
                </div>
            </div>
        </div>

        <div id="container-volumes"></div>
    </div>

    <div id="loading">⌛ Gerando PDF Oficial...</div>

    <div class="botoes-fixos">
        <button type="button" class="btn btn-add" id="btn-add-vol" onclick="addV()" style="display:none;">ADICIONAR VOLUME</button>
        <button type="button" class="btn btn-standby" onclick="salvarParaDepois()">STANDBY (NF)</button>
        <button type="button" class="btn btn-save" onclick="gerarPDF()">GERAR PDF</button>
    </div>

    <div id="modal-pendentes">
        <div class="modal-conteudo">
            <h3 style="color: var(--verde-centro); border-bottom: 2px solid var(--borda); padding-bottom: 10px; margin-bottom: 15px;">Aguardando Nota Fiscal</h3>
            <div id="lista-pendentes-corpo" style="max-height: 350px; overflow-y: auto;"></div>
            <button onclick="document.getElementById('modal-pendentes').style.display='none'" style="width:100%; padding:15px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; background: white; margin-top: 15px; cursor: pointer;">FECHAR</button>
        </div>
    </div>

<script>
    let pendentes = [];
    try {
        pendentes = JSON.parse(localStorage.getItem('checklists_pendentes') || '[]');
    } catch (e) { pendentes = []; }

    function atualizarContador() {
        const span = document.getElementById('count-pendentes');
        if (span) {
            span.innerText = pendentes.length;
            span.style.display = 'inline-block';
        }
    }

// --- A MÁGICA: DIMINUIR A FOTO ANTES DE USAR ---
    async function comprimirImagem(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1920; // AUMENTADO PARA MAIOR NITIDEZ (Antes era 800)
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // Aumentamos a qualidade do JPEG de 0.7 para 0.85
                    resolve(canvas.toDataURL('image/jpeg', 0.95));
                };
            };
        });
    }

    // Atualizado para usar compressão
    async function preview(input) {
        if (input.files && input.files[0]) {
            const box = input.parentElement;
            const msg = box.querySelector('.msg-camera');
            const imgElement = box.querySelector('img');
            
            msg.innerText = "⌛ Reduzindo...";
            
            // Comprime a imagem antes de colocar no HTML
            const imagemCompacta = await comprimirImagem(input.files[0]);
            
            imgElement.src = imagemCompacta;
            imgElement.style.display = 'block';
            msg.style.display = 'none';
        }
    }

    function salvarParaDepois() {
        const placa = document.getElementById('p').value;
        if (!placa) return alert("Digite a PLACA!");

        const dados = {
            p: placa,
            c: document.getElementById('c').value,
            t: document.getElementById('t').value,
            m: document.getElementById('m').value,
            q: document.getElementById('qtd-volumes').value,
            tp: document.getElementById('tipo-carga').value,
            nf: document.getElementById('nota-fiscal').value,
            dt: new Date().toLocaleString(),
            htmlCam: document.getElementById('secao-caminhao').innerHTML,
            htmlVol: document.getElementById('container-volumes').innerHTML
        };

        try {
            pendentes.push(dados);
            localStorage.setItem('checklists_pendentes', JSON.stringify(pendentes));
            alert("✅ Salvo no Standby!");
            window.location.reload(); // Limpa tudo e atualiza contador
        } catch (e) {
            alert("⚠️ Memória cheia! Gere o PDF desta carga ou exclua pendentes antigos.");
        }
    }

    function abrirPendentes() {
        const corpo = document.getElementById('lista-pendentes-corpo');
        corpo.innerHTML = '';
        if (pendentes.length === 0) {
            corpo.innerHTML = '<p style="text-align:center;color:gray;padding:20px;">Vazio</p>';
        } else {
            pendentes.forEach((item, i) => {
                corpo.innerHTML += `
                    <div style="background:#f9f9f9; border:1px solid #ddd; padding:10px; border-radius:8px; margin-bottom:10px;">
                        <strong>Placa: ${item.p}</strong><br><small>${item.dt}</small>
                        <div style="margin-top:10px; display:flex; gap:5px;">
                            <button onclick="recuperar(${i})" style="flex:1; background:#2E7D32; color:white; border:none; padding:8px; border-radius:5px;">RETOMAR</button>
                            <button onclick="excluirItem(${i})" style="background:#D32F2F; color:white; border:none; padding:8px 12px; border-radius:5px;">X</button>
                        </div>
                    </div>`;
            });
        }
        document.getElementById('modal-pendentes').style.display = 'block';
    }

    function excluirItem(index) {
        if (confirm("Excluir?")) {
            pendentes.splice(index, 1);
            localStorage.setItem('checklists_pendentes', JSON.stringify(pendentes));
            abrirPendentes();
            atualizarContador();
        }
    }

    function recuperar(i) {
        const item = pendentes[i];
        document.getElementById('p').value = item.p;
        document.getElementById('c').value = item.c;
        document.getElementById('t').value = item.t;
        document.getElementById('m').value = item.m;
        document.getElementById('qtd-volumes').value = item.q;
        document.getElementById('tipo-carga').value = item.tp;
        document.getElementById('nota-fiscal').value = item.nf;
        document.getElementById('secao-caminhao').innerHTML = item.htmlCam;
        document.getElementById('container-volumes').innerHTML = item.htmlVol;
        document.getElementById('secao-caminhao').style.display = 'block';
        document.getElementById('btn-add-vol').style.display = 'block';
        
        pendentes.splice(i, 1);
        localStorage.setItem('checklists_pendentes', JSON.stringify(pendentes));
        document.getElementById('modal-pendentes').style.display = 'none';
        atualizarContador();
    }

    function mudarTipoCarga() {
        const tipo = document.getElementById('tipo-carga').value;
        const secCam = document.getElementById('secao-caminhao');
        const btnAdd = document.getElementById('btn-add-vol');
        if (tipo === "") {
            secCam.style.display = 'none';
            btnAdd.style.display = 'none';
        } else {
            secCam.style.display = 'block';
            btnAdd.style.display = 'block';
            if(document.getElementById('container-volumes').innerHTML === "") addV();
        }
    }

    function addV() {
        const container = document.getElementById('container-volumes');
        const num = container.querySelectorAll('.volume-box').length + 1;
        const labelDinamico = (document.getElementById('tipo-carga').value === "Bag in Box") ? "FOTO CARGA" : "FOTO LACRE";
        const html = `
            <div class="volume-box">
                <div class="header-volume"><h4>Volume ${num}</h4>
                ${num > 1 ? `<button type="button" onclick="this.closest('.volume-box').remove(); reordenar();" style="color:red; background:none; border:none;">REMOVER</button>` : ''}
                </div>
                <div class="foto-wrapper">
                    <div class="foto-col"><label>FOTO ETIQUETA</label>
                        <div class="box-imagem"><span class="msg-camera">📷 Foto</span><input type="file" accept="image/*" capture="environment" onchange="preview(this)"><img style="display:none;"></div>
                    </div>
                    <div class="foto-col"><label>${labelDinamico}</label>
                        <div class="box-imagem"><span class="msg-camera">📷 Foto</span><input type="file" accept="image/*" capture="environment" onchange="preview(this)"><img style="display:none;"></div>
                    </div>
                </div>
            </div>`;
        container.insertAdjacentHTML('beforeend', html);
    }

    function reordenar() {
        document.querySelectorAll('#container-volumes h4').forEach((h, i) => h.innerText = `Volume ${i+1}`);
    }

function gerarPDF() {
    const element = document.getElementById('render-area');
    const load = document.getElementById('loading');
    const info = document.getElementById('data-hora-pdf');
    const nf = document.getElementById('nota-fiscal').value;

    // --- 1. VALIDAÇÃO DE CAMPOS DE TEXTO ---
    const camposObrigatorios = element.querySelectorAll('input[required], select[required]');
    let faltamDados = false;

    camposObrigatorios.forEach(campo => {
        if (!campo.value.trim()) {
            campo.style.border = "2px solid red"; // Destaca o erro
            faltamDados = true;
        } else {
            campo.style.border = "1px solid #ccc";
        }
    });

    if (faltamDados) {
        return alert("Erro: Preencha todos os campos obrigatórios marcados em vermelho!");
    }

    // --- 2. VALIDAÇÃO DE FOTOS ---
    // Verifica se existe alguma .box-imagem que não contenha uma tag <img> dentro
    const boxesImagens = element.querySelectorAll('.box-imagem');
    let faltamFotos = false;

    boxesImagens.forEach(box => {
        const temImg = box.querySelector('img');
        if (!temImg) {
            box.style.backgroundColor = "#ffe6e6"; // Destaca a box sem foto
            box.style.border = "2px dashed red";
            faltamFotos = true;
        } else {
            box.style.backgroundColor = "#fff";
            box.style.border = "1px solid #ccc";
        }
    });

    if (faltamFotos) {
        return alert("Erro: Estão faltando fotos obrigatórias! Verifique as caixas em vermelho.");
    }

    // --- SE PASSOU NA VALIDAÇÃO, GERA O PDF ---
    window.scrollTo(0, 0);
    load.style.display = 'block';
    element.classList.add('modo-pdf');
    
    const agora = new Date();
    info.innerText = `Gerado em: ${agora.toLocaleString('pt-BR')}`;
    info.style.display = 'block';

    const inputs = element.querySelectorAll('input, select');
    inputs.forEach(i => { if (i.type !== 'file') i.setAttribute('value', i.value); });

    // Paginação
    document.querySelectorAll('.quebra-pagina-manual').forEach(q => q.remove());
    const volumes = document.querySelectorAll('#container-volumes .volume-box');
    volumes.forEach((vol, index) => {
        if ((index + 1) % 2 === 0 && index !== volumes.length - 1) {
            const divisor = document.createElement('div');
            divisor.className = 'quebra-pagina-manual';
            divisor.style.clear = 'both';
            divisor.style.pageBreakAfter = 'always';
            vol.parentNode.insertBefore(divisor, vol.nextSibling);
        }
    });

const opt = {
        margin: [15, 10, 15, 10], /* Margem superior aumentada para 15mm para segurar o conteúdo */
        filename: `Checklist_NF_${nf}.pdf`,
        image: { type: 'jpeg', quality: 1.0 },
        html2canvas: { 
            scale: 3, 
            useCORS: true, 
            logging: false,
            scrollY: 0, 
            y: 0, /* Essa linha é a grande trava: Força a captura a partir do exato pixel zero do topo */
            windowWidth: 800 
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['css', 'legacy'] }
    };

    setTimeout(() => {
        html2pdf().set(opt).from(element).save().then(() => {
            element.classList.remove('modo-pdf');
            document.querySelectorAll('.quebra-pagina-manual').forEach(q => q.remove());
            load.style.display = 'none';
            info.style.display = 'none';
        });
    }, 500);
}
    window.onload = atualizarContador;
</script>
</body>
</html>
