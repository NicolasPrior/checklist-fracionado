<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Checklist de Fracionado - Centrosucar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #e2e8f0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
        }
        
        #render-area {
            width: 100%;
            max-width: 800px;
            background: transparent;
        }

        .folha-a4 {
            width: 100%;
            padding: 20px 30px; 
            background: white;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px; 
            border-radius: 8px; 
        }

        .volume-box { page-break-inside: avoid; position: relative;} 

        .header { 
            text-align: center; 
            border-bottom: 3px solid #2E7D32; 
            padding-bottom: 15px; 
            margin-bottom: 15px; 
        }
        .header img { max-width: 160px; }
        .header h2 { color: #2E7D32; font-size: 20px; margin-top: 10px; text-transform: uppercase; }

        #data-hora-registro {
            text-align: center; font-size: 12px; color: #555; margin-bottom: 20px; display: none; font-weight: bold;
        }

        .dados-container { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;
            background: #f9f9f9; border: 1px solid #eee; padding: 15px; border-radius: 8px;
        }
        .campo { display: flex; flex-direction: column; text-align: left; }
        .campo label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .campo input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        .erro-input { border: 2px solid red !important; background: #ffe6e6 !important; }

        .volume-box {
            border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: white;
        }
        
        .header-volume { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        .header-volume h4 { color: #2E7D32; text-transform: uppercase; }
        
        .btn-remover { background: #ffe6e6; color: #d32f2f; border: 1px solid #d32f2f; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px;}
        
        .foto-wrapper { display: flex; justify-content: space-between; gap: 15px; }
        .foto-col { width: 48%; text-align: center; }
        .foto-col label { font-size: 12px; font-weight: bold; margin-bottom: 10px; display: block; color: #333; }
        
        .box-imagem {
            width: 100%; height: 220px; border: 2px dashed #2E7D32; border-radius: 8px;
            background: #fafafa; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; cursor: pointer; overflow: hidden; transition: 0.3s;
        }
        .box-imagem input {
            position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10;
        }
        .box-imagem img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; background: white; z-index: 5;}
        
        .btn-foto { font-size: 12px; font-weight: bold; color: #2E7D32; z-index: 1;}
        .aviso-trocar { font-size: 10px; color: white; background: rgba(0,0,0,0.6); position: absolute; bottom: 0; width: 100%; padding: 5px; z-index: 6; display: none;}

        .botoes-fixos { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 10px; margin-top: 20px; padding-bottom: 50px; }
        .btn { padding: 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px;}
        .btn-add { background: white; color: #2E7D32; border: 2px solid #2E7D32; }
        .btn-save { background: #2E7D32; color: white; }

        /* Nova tela de carregamento (porque gerar o arquivo para compartilhar demora 1-2 segundos) */
        #loading { display: none; text-align: center; color: #2E7D32; font-weight: bold; padding: 10px; }

        @media (max-width: 600px) {
            .foto-wrapper { flex-direction: column; }
            .foto-col { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="render-area">
        <div class="folha-a4" id="p1">
            <div class="header">
                <img src="https://campanha.centrosucar.com/wp-content/uploads/2021/04/logo-centrosucar.png" alt="Logo Centrosucar">
                <h2>Checklist de Carga Fracionada</h2>
            </div>
            
            <div id="data-hora-registro"></div>

            <div class="dados-container">
                <div class="campo"><label>Cliente *</label><input type="text" id="c" placeholder="Obrigatório"></div>
                <div class="campo"><label>Transportadora *</label><input type="text" id="t" placeholder="Obrigatório"></div>
                <div class="campo"><label>Motorista *</label><input type="text" id="m" placeholder="Obrigatório"></div>
                <div class="campo"><label>Placa do Veículo *</label><input type="text" id="p" placeholder="Obrigatório"></div>
            </div>

            <div id="cont-vols-p1">
                <div class="volume-box">
                    <div class="header-volume">
                        <h4>Volume 1</h4>
                    </div>
                    <div class="foto-wrapper">
                        <div class="foto-col">
                            <label>Foto da Etiqueta *</label>
                            <div class="box-imagem">
                                <span class="btn-foto">📷 Toque para Câmera</span>
                                <input type="file" accept="image/*" capture="environment" onchange="ver(this)" data-html2canvas-ignore="true" class="input-foto">
                                <img>
                                <div class="aviso-trocar" data-html2canvas-ignore="true">Tocar para trocar foto</div>
                            </div>
                        </div>
                        <div class="foto-col">
                            <label>Foto do Lacre *</label>
                            <div class="box-imagem">
                                <span class="btn-foto">📷 Toque para Câmera</span>
                                <input type="file" accept="image/*" capture="environment" onchange="ver(this)" data-html2canvas-ignore="true" class="input-foto">
                                <img>
                                <div class="aviso-trocar" data-html2canvas-ignore="true">Tocar para trocar foto</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="botoes-fixos">
        <button class="btn btn-add" onclick="novoV()" data-html2canvas-ignore="true">+ Adicionar Próximo Volume</button>
        <button id="btn-gerar" class="btn btn-save" onclick="gerar()" data-html2canvas-ignore="true">Validar e Compartilhar</button>
        <div id="loading" data-html2canvas-ignore="true">Preparando o arquivo para envio... Aguarde.</div>
    </div>

    <script>
        function ver(i) {
            if (i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    const box = i.closest('.box-imagem');
                    const img = box.querySelector('img');
                    const aviso = box.querySelector('.aviso-trocar');
                    
                    img.src = e.target.result;
                    img.style.display = 'block';
                    aviso.style.display = 'block'; 
                    box.classList.remove('erro-input'); 
                    box.style.border = "2px solid #2E7D32"; 
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        let vols = 1;

        function novoV() {
            vols++;
            let pags = Math.ceil(vols / 2); 

            if (!document.getElementById(`cont-vols-p${pags}`)) {
                const nP = `
                    <div class="folha-a4" id="p${pags}">
                        <div id="cont-vols-p${pags}"></div>
                    </div>`;
                document.getElementById('render-area').insertAdjacentHTML('beforeend', nP);
            }
            
            const target = document.getElementById(`cont-vols-p${pags}`);
            const html = `
                <div class="volume-box">
                    <div class="header-volume">
                        <h4>Volume ${vols}</h4>
                        <button class="btn-remover" onclick="removerV(this)" data-html2canvas-ignore="true">🗑️ Remover</button>
                    </div>
                    <div class="foto-wrapper">
                        <div class="foto-col">
                            <label>Foto da Etiqueta *</label>
                            <div class="box-imagem">
                                <span class="btn-foto">📷 Toque para Câmera</span>
                                <input type="file" accept="image/*" capture="environment" onchange="ver(this)" data-html2canvas-ignore="true" class="input-foto">
                                <img>
                                <div class="aviso-trocar" data-html2canvas-ignore="true">Tocar para trocar foto</div>
                            </div>
                        </div>
                        <div class="foto-col">
                            <label>Foto do Lacre *</label>
                            <div class="box-imagem">
                                <span class="btn-foto">📷 Toque para Câmera</span>
                                <input type="file" accept="image/*" capture="environment" onchange="ver(this)" data-html2canvas-ignore="true" class="input-foto">
                                <img>
                                <div class="aviso-trocar" data-html2canvas-ignore="true">Tocar para trocar foto</div>
                            </div>
                        </div>
                    </div>
                </div>`;
            target.insertAdjacentHTML('beforeend', html);
        }

        function removerV(botao) {
            const caixaVolume = botao.closest('.volume-box');
            caixaVolume.remove();
        }

        document.querySelectorAll('.campo input').forEach(input => {
            input.addEventListener('input', function() {
                this.classList.remove('erro-input');
            });
        });

        function gerar() {
            let temErroTextos = false;
            let temErroFotos = false;

            const campos = ['c', 't', 'm', 'p'];
            campos.forEach(id => {
                const el = document.getElementById(id);
                if (!el.value.trim()) { 
                    el.classList.add('erro-input'); 
                    temErroTextos = true; 
                }
            });

            const inputsFoto = document.querySelectorAll('.input-foto');
            inputsFoto.forEach(input => {
                const box = input.closest('.box-imagem');
                if (input.files.length === 0) {
                    box.classList.add('erro-input');
                    temErroFotos = true;
                }
            });

            if (temErroTextos || temErroFotos) {
                let msg = "Atenção!\n";
                if (temErroTextos) msg += "- Preencha todos os campos do cabeçalho.\n";
                if (temErroFotos) msg += "- Você esqueceu de tirar algumas fotos! (Verifique as caixas vermelhas).";
                alert(msg);
                return; 
            }

            // Exibe mensagem de carregamento e esconde o botão temporariamente
            document.getElementById('btn-gerar').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            const c = document.getElementById('c').value.trim();
            const agora = new Date();
            const dataStr = agora.toLocaleDateString('pt-BR');
            const horaStr = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            
            const dataHoraDiv = document.getElementById('data-hora-registro');
            dataHoraDiv.innerHTML = `Checklist validado e finalizado em: ${dataStr} às ${horaStr}`;
            dataHoraDiv.style.display = 'block'; 

            const element = document.getElementById('render-area');
            const nomeArquivo = `Checklist_${c}_${dataStr.replace(/\//g, '-')}.pdf`;
            
            const opt = {
                margin: [15, 10, 10, 10], 
                filename: nomeArquivo,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'], avoid: '.volume-box' } 
            };

            // LÓGICA DE COMPARTILHAMENTO (Nativa do Celular)
            html2pdf().set(opt).from(element).output('blob').then(function(pdfBlob) {
                // Prepara o arquivo PDF
                const file = new File([pdfBlob], nomeArquivo, { type: 'application/pdf' });

                // Retorna a interface ao normal
                document.getElementById('loading').style.display = 'none';
                document.getElementById('btn-gerar').style.display = 'block';

                // Verifica se o aparelho suporta a aba nativa de compartilhamento
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({
                        title: 'Checklist de Carga',
                        text: `Checklist do cliente ${c} finalizado.`,
                        files: [file]
                    }).catch((error) => {
                        console.log('Compartilhamento cancelado.', error);
                    });
                } else {
                    // Fallback: se o dispositivo não suportar (ex: PC), faz o download direto
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(pdfBlob);
                    link.download = nomeArquivo;
                    link.click();
                }
            });
        }
    </script>
</body>
</html>
